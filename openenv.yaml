name: sql-repair-env
version: "1.0"

description: >
  An OpenEnv-compliant environment for repairing broken SQL queries.
  The agent must fix syntax and logical errors in SQL using database schema context.

entry_point: env.environment:SQLRepairEnv

tags:
  - openenv
  - sql
  - debugging
  - ai

author: "Your Name"
license: "MIT"

tasks:
  - name: easy
    description: Fix datatype error in WHERE clause
    difficulty: easy

  - name: medium
    description: Fix missing JOIN condition
    difficulty: medium

  - name: hard
    description: Fix incorrect subquery usage
    difficulty: hard